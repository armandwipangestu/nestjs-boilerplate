services:
  app-nestjs-boilerplate:
    image: ghcr.io/armandwipangestu/nestjs-boilerplate:latest
    container_name: app-nestjs-boilerplate
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env.app
    depends_on:
      db-nestjs-boilerplate:
        condition: service_healthy
      redis-nestjs-boilerplate:
        condition: service_started
    volumes:
      - ./docker-data/nestjs-boilerplate/logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "500M"
        max-file: "3"

  db-nestjs-boilerplate:
    image: postgres:17-bookworm
    container_name: db-nestjs-boilerplate
    restart: always
    env_file: .env.postgres
    ports:
      - "5434:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "500M"
        max-file: "3"

  pgadmin4-nestjs-boilerplate:
    image: dpage/pgadmin4:9.10.0
    container_name: pgadmin4-nestjs-boilerplate
    restart: always
    env_file: .env.postgres
    ports:
      - "5051:80"
    volumes:
      - ./docker-data/pgadmin:/var/lib/pgadmin
    logging:
      driver: "json-file"
      options:
        max-size: "500M"
        max-file: "3"
    depends_on:
      db-nestjs-boilerplate:
        condition: service_healthy

  redis-nestjs-boilerplate:
    image: redis:7.4-alpine
    container_name: redis-nestjs-boilerplate
    restart: always
    # Comment below line if you don't want to use password
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    ports:
      - "6380:6379"
    volumes:
      - ./docker-data/redis:/data
    logging:
      driver: "json-file"
      options:
        max-size: "500M"
        max-file: "3"

  minio-nestjs-boilerplate:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio-nestjs-boilerplate
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: "minioadmin"
      MINIO_SERVER_URL: http://minio-nestjs-boilerplate:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker-data/minio/data:/data
    command: server /data --address ":9000" --console-address ":9001"
    logging:
      driver: "json-file"
      options:
        max-size: "500M"
        max-file: "3"
